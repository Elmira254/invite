<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Bouquet for You</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #faf6f0;
  --warm-white: #fefcf9;
  --text-dark: #3a2e2e;
  --text-soft: #7a6b6b;
}

html { scroll-behavior: smooth; overflow-x: hidden; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  overflow-x: hidden;
}

/* ===== STAGE 1: ENVELOPE ===== */
#envelope-stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--warm-white);
  z-index: 1000; cursor: pointer;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#envelope-stage.opened {
  opacity: 0; visibility: hidden; pointer-events: none;
}

.envelope-wrapper {
  position: relative; width: 240px; height: 180px;
  animation: floatEnvelope 3s ease-in-out infinite;
}
@keyframes floatEnvelope {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.envelope { position: relative; width: 100%; height: 100%; }

.envelope-body {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #f5efe6, #ede4d4);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  overflow: hidden;
}

.envelope-flap {
  position: absolute; top: 0; left: 0; right: 0; height: 55%;
  background: linear-gradient(180deg, #f0e8da, #e8dfc8);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top center;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2;
}

.envelope-body .flowers-on-envelope {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 120px; height: 80px;
  display: flex; align-items: center; justify-content: center; z-index: 1;
}
.envelope-body .flowers-on-envelope svg { width: 100%; height: 100%; }

.envelope-seal {
  position: absolute; top: 46%; left: 50%;
  transform: translate(-50%, -50%);
  width: 36px; height: 36px;
  background: radial-gradient(circle, #c9a0d4, #a67bc2);
  border-radius: 50%; z-index: 3;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(169, 123, 194, 0.4);
}
.envelope-seal::after {
  content: ''; width: 14px; height: 14px;
  background: radial-gradient(circle, #e8d0f0, #d4b8e0);
  border-radius: 50%; opacity: 0.6;
}

.hint-text {
  position: absolute; bottom: -48px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Dancing Script', cursive;
  font-size: 18px; color: var(--text-soft);
  white-space: nowrap;
  animation: pulseHint 2s ease-in-out infinite;
}
@keyframes pulseHint {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ===== STAGE 2: FLOWER EXPLOSION ===== */
#explosion-container {
  position: fixed; inset: 0;
  z-index: 999; pointer-events: none; overflow: hidden;
}

.flower-particle {
  position: absolute;
  opacity: 0;
  will-change: transform, opacity;
  z-index: 1;
}

.flower-particle img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08));
}

/* For images with black backgrounds - use screen blend */
.flower-particle.blend-screen img {
  mix-blend-mode: screen;
}

/* ===== FLOWER BACKGROUND ===== */
#flower-bg {
  position: fixed; inset: 0;
  background: url('fon1.png') center/cover no-repeat;
  opacity: 0;
  z-index: -1;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
#flower-bg.visible { opacity: 0.25; }

/* ===== STAGE 3: SCROLL CONTENT ===== */
#scroll-content {
  opacity: 0;
  transition: opacity 1s ease 0.3s;
  min-height: 100vh;
}
#scroll-content.visible { opacity: 1; }

.watercolor-bg {
  position: fixed; inset: 0; z-index: -1;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(232,160,180,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(184,169,212,0.12) 0%, transparent 40%),
    radial-gradient(ellipse at 60% 70%, rgba(232,200,74,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 30% 80%, rgba(143,164,212,0.1) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 60%, rgba(240,196,160,0.12) 0%, transparent 35%);
}

.watercolor-element {
  position: fixed; opacity: 0.12;
  pointer-events: none; z-index: -1;
}

.hero-section {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; position: relative;
}

.bouquet-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 400; font-style: italic;
  color: var(--text-dark); text-align: center;
  margin-bottom: 40px;
  opacity: 0; transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards 0.2s;
}
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.bouquet-illustration {
  width: clamp(200px, 40vw, 340px);
  margin: 0 auto 40px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.4s;
}

.bouquet-illustration img {
  width: 100%; height: auto;
  display: block;
}

.scroll-hint {
  font-size: 12px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-soft);
  text-align: center; margin-top: 20px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.6s;
}
.scroll-hint .arrow {
  display: block; margin-top: 8px;
  animation: bounce 2s ease-in-out infinite;
  font-size: 18px;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

.bouquet-content {
  max-width: 900px; margin: 0 auto;
  padding: 0 24px 100px;
}
.section-label {
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-soft);
  text-align: center; margin-bottom: 40px;
}

.flowers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px; margin-bottom: 80px;
}
.flower-card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius: 16px; padding: 24px 20px;
  text-align: center;
  border: 1px solid rgba(0,0,0,0.04);
  box-shadow: 0 4px 20px rgba(0,0,0,0.03);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  opacity: 0; transform: translateY(30px);
}
.flower-card.visible {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.flower-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
}
.flower-icon { width: 56px; height: 56px; margin: 0 auto 16px; }
.flower-icon svg { width: 100%; height: 100%; }
.flower-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 18px; font-weight: 600;
  margin-bottom: 6px; color: var(--text-dark);
}
.flower-meaning {
  font-size: 13px; color: var(--text-soft); font-style: italic;
}

.greeting-section {
  display: flex; flex-direction: column;
  align-items: center; margin-bottom: 80px;
}
.greeting-card {
  background: white; border-radius: 12px;
  padding: 48px 40px; max-width: 380px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.06);
  position: relative;
  opacity: 0; transform: translateY(30px) rotate(-1deg);
  border: 1px solid rgba(0,0,0,0.04);
}
.greeting-card.visible {
  opacity: 1; transform: translateY(0) rotate(-1deg);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.greeting-card .stamp {
  position: absolute; bottom: 12px; right: 12px;
  width: 40px; height: 48px;
  display: flex; align-items: center; justify-content: center;
}
.greeting-card .stamp::after {
  content: '♥';
  font-size: 32px;
  color: #e04040;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.to-from-row { display: flex; justify-content: space-between; margin-bottom: 24px; }
.to-from-item { font-size: 13px; color: var(--text-soft); }
.to-right { text-align: right; }
.to-from-item span {
  display: block;
  font-family: 'Dancing Script', cursive;
  font-size: 22px; color: var(--text-dark); margin-top: 4px;
}
.message {
  font-family: 'Dancing Script', cursive;
  font-size: 15px; color: var(--text-dark);
  line-height: 1.4; padding-top: 16px;
  border-top: 1px solid rgba(0,0,0,0.06);
}

.bloom-timer {
  text-align: center; margin-bottom: 60px;
  opacity: 0; transform: translateY(20px);
}
.bloom-timer.visible {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.bloom-timer p { font-size: 14px; color: var(--text-soft); font-style: italic; }
.bloom-timer .flower-emoji {
  display: inline-block;
  animation: gentleSpin 4s ease-in-out infinite;
}
@keyframes gentleSpin {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(10deg); }
}

.actions { display: flex; flex-direction: column; gap: 16px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: 50px;
  font-size: 14px; font-weight: 500;
  text-decoration: none; transition: all 0.3s ease;
  border: none; cursor: pointer; letter-spacing: 0.3px;
}
.btn-share { background: var(--text-dark); color: white; }
.btn-share:hover {
  background: #2a2020;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(58,46,46,0.2);
}
.btn-garden {
  background: transparent; color: var(--text-dark);
  border: 1.5px solid rgba(0,0,0,0.12);
}
.btn-garden:hover { border-color: var(--text-dark); transform: translateY(-2px); }
.btn svg { width: 16px; height: 16px; }

.footer {
  text-align: center; padding: 60px 20px 40px;
  font-size: 12px; color: var(--text-soft); opacity: 0.6;
}

.bouquet-content {
  padding-top: 40px;
  min-height: 50vh;
}

@media (max-width: 768px) {
  .hero-section {
    min-height: 100vh;
    min-height: 100dvh;
    padding: 40px 16px;
  }
  .bouquet-content {
    padding-top: 60px;
  }
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.5s ease, transform 0.2s ease;
  pointer-events: none;
}
.music-btn.visible {
  opacity: 1;
  pointer-events: auto;
}
.music-btn:hover {
  transform: scale(1.1);
}
.music-btn.muted {
  opacity: 0.5;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .envelope-wrapper { animation: none; }
  .hint-text { animation: none; opacity: 0.7; }
}
</style>
</head>
<body>

<!-- STAGE 1: ENVELOPE -->
<div id="envelope-stage">
  <div class="envelope-wrapper">
    <div class="envelope">
      <div class="envelope-body">
        <div class="flowers-on-envelope">
          <svg viewBox="0 0 120 80" fill="none">
            <g transform="translate(60,45)">
              <line x1="0" y1="0" x2="-8" y2="25" stroke="#7db87a" stroke-width="1.5"/>
              <line x1="0" y1="0" x2="5" y2="28" stroke="#7db87a" stroke-width="1.5"/>
              <line x1="0" y1="0" x2="12" y2="22" stroke="#7db87a" stroke-width="1.5"/>
              <circle cx="-8" cy="-4" r="8" fill="#e8a0b4" opacity="0.9"/>
              <circle cx="8" cy="-6" r="7" fill="#b8a9d4" opacity="0.85"/>
              <circle cx="0" cy="-12" r="9" fill="#f0c4a0" opacity="0.9"/>
              <circle cx="-4" cy="-8" r="4" fill="#f5e6a3" opacity="0.7"/>
              <circle cx="6" cy="-2" r="5" fill="#e8a0b4" opacity="0.6"/>
              <ellipse cx="-14" cy="10" rx="4" ry="8" fill="#7db87a" opacity="0.6" transform="rotate(-20 -14 10)"/>
              <ellipse cx="16" cy="8" rx="4" ry="7" fill="#7db87a" opacity="0.5" transform="rotate(15 16 8)"/>
            </g>
          </svg>
        </div>
        <div class="envelope-seal"></div>
      </div>
      <div class="envelope-flap" id="envelope-flap"></div>
    </div>
    <div class="hint-text">tap to open</div>
  </div>
</div>

<!-- Music toggle button -->
<button class="music-btn" id="music-btn" onclick="toggleMusic()">&#9835;</button>

<!-- STAGE 2: FLOWER EXPLOSION -->
<div id="explosion-container"></div>
<div id="flower-bg"></div>

<!-- STAGE 3: SCROLL CONTENT -->
<div id="scroll-content">
  <div class="watercolor-bg"></div>
  
  <svg class="watercolor-element" style="top:5%;left:8%;width:120px;height:120px;" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" fill="#f5e6a3" opacity="0.15"/>
  </svg>
  <svg class="watercolor-element" style="top:15%;right:10%;width:140px;height:100px;" viewBox="0 0 100 70">
    <ellipse cx="50" cy="35" rx="40" ry="25" fill="#b8a9d4" opacity="0.1"/>
  </svg>

  <section class="hero-section">
    <h1 class="bouquet-title">A Bouquet for You</h1>
    <div class="bouquet-illustration">
      <img src="bouqet.jpg" alt="Bouquet" draggable="false">
    </div>
    <div class="scroll-hint">
      SCROLL TO EXPLORE
      <span class="arrow">&darr;</span>
    </div>
  </section>

  <section class="bouquet-content">
    <div class="greeting-section">
      <div class="greeting-card" id="greeting-card">
        <div class="stamp"></div>
        <div class="to-from-row">
          <div class="to-from-item">FROM<span>Islam</span></div>
          <div class="to-from-item to-right">TO<span>Kitty</span></div>
        </div>
        <div class="message">Дорогая кошечка, хочу пригласить тебя на свидание в эти выходные — только я и ты. Будет много веселья, интересностей и, конечно же, еда! Точную дату и время я тебе напишу.
          <br>С любовью, твой чёрный котик</div>
      </div>
    </div>
  </section>

  <div class="footer">Made with love &#x1F337;</div>
</div>

<script>
// ===== FLOWER IMAGE CONFIG =====
// Each flower: path, weight (how often it appears), blend mode for dark-bg images
const flowerImages = [
  { src: 'flowers/pinkrose.png',      weight: 5, blend: 'normal' },   // coral rose
  { src: 'flowers/pin2k.png',          weight: 4, blend: 'normal' },   // pink hibiscus
  { src: 'flowers/blue.png',           weight: 3, blend: 'normal' },   // blue rose
  { src: 'flowers/Png.png',            weight: 2, blend: 'normal' },   // red lily
  { src: 'flowers/rose.png',           weight: 5, blend: 'normal' },   // pink rose
  { src: 'flowers/peon.png',           weight: 4, blend: 'screen' },   // peony (black bg)
  { src: 'flowers/pink.png',           weight: 4, blend: 'normal' },   // pink cosmos
  { src: 'flowers/red flower.png',     weight: 3, blend: 'normal' },   // red dahlia
  { src: 'flowers/pink-flower-white-background.png', weight: 4, blend: 'normal' }, // pink dahlia
  { src: 'flowers/pink lily.png',      weight: 3, blend: 'screen' },   // pink lily (black bg)
  { src: 'flowers/Blue Flower Petals Images – Browse 3,399,200 Stock Photos, Vectors, and Video.png', weight: 3, blend: 'normal' }, // blue hibiscus
  { src: 'flowers/Gemini_Generated_Image_1ufca11ufca11ufc.png', weight: 4, blend: 'normal' },
  { src: 'flowers/Gemini_Generated_Image_2kluaa2kluaa2klu.png', weight: 4, blend: 'normal' },
  { src: 'flowers/Gemini_Generated_Image_gafvp2gafvp2gafv.png', weight: 4, blend: 'normal' },
  { src: 'flowers/Gemini_Generated_Image_w36zyjw36zyjw36z.png', weight: 4, blend: 'normal' },
];

// Build weighted pool
const flowerPool = [];
flowerImages.forEach(f => { for (let i = 0; i < f.weight; i++) flowerPool.push(f); });

function pickFlower() {
  return flowerPool[Math.floor(Math.random() * flowerPool.length)];
}

// ===== SOUNDS =====
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Soft pop for envelope
function playPop() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.15);
}

// Magical sparkle for flowers
function playSparkle() {
  const ctx = getAudioCtx();
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.08);
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * 0.08 + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.08 + 0.4);
    osc.start(ctx.currentTime + i * 0.08);
    osc.stop(ctx.currentTime + i * 0.08 + 0.4);
  });
}

// Ambient background music
let bgMusic = null;
function playBgMusic() {
  if (bgMusic) return;
  bgMusic = new Audio('background.mp3');
  bgMusic.loop = true;
  bgMusic.volume = 0.2;
  bgMusic.play().catch(() => {});
}

function stopBgMusic() {
  if (bgMusic) {
    bgMusic.pause();
    bgMusic = null;
  }
}

let isMusicPlaying = true;
function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (bgMusic) {
    bgMusic.muted = !bgMusic.muted;
    isMusicPlaying = !bgMusic.muted;
    btn.classList.toggle('muted', bgMusic.muted);
  }
}

// ===== ENVELOPE OPENING =====
const envelopeStage = document.getElementById('envelope-stage');
const envelopeFlap = document.getElementById('envelope-flap');
const explosionContainer = document.getElementById('explosion-container');
const scrollContent = document.getElementById('scroll-content');
const flowerBg = document.getElementById('flower-bg');

let isOpened = false;

envelopeStage.addEventListener('click', () => {
  if (isOpened) return;
  isOpened = true;
  
  playPop();
  envelopeFlap.style.transform = 'rotateX(180deg)';
  
  setTimeout(() => {
    playBgMusic();
    document.getElementById('music-btn').classList.add('visible');
    envelopeStage.classList.add('opened');
    startExplosion();
    playSparkle();
    setTimeout(() => {
      window.scrollTo(0, 0);
      scrollContent.classList.add('visible');
      initScrollAnimations();
    }, 3600);
  }, 500);
});

// ===== FLOWER EXPLOSION =====
function startExplosion() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Dense grid with heavy overlap — flowers cover every pixel
  const flowerSize = 160;
  const overlap = 0.6; // 60% overlap between neighbors
  const step = flowerSize * (1 - overlap);
  const cols = Math.ceil(vw / step) + 2;
  const rows = Math.ceil(vh / step) + 2;
  const total = cols * rows;

  const particles = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 'flower-particle';

      const flower = pickFlower();
      const img = document.createElement('img');
      img.src = flower.src;
      img.draggable = false;
      el.appendChild(img);

      if (flower.blend === 'screen') {
        el.classList.add('blend-screen');
      }

      // Vary size per flower for organic look
      const sizeJitter = 0.7 + Math.random() * 0.7;
      const size = flowerSize * sizeJitter;
      el.style.width = size + 'px';
      el.style.height = size + 'px';

      // Target grid position + random offset for organic feel
      const jitterX = (Math.random() - 0.5) * step * 0.6;
      const jitterY = (Math.random() - 0.5) * step * 0.6;
      const targetX = c * step + jitterX - (cols * step - vw) / 2;
      const targetY = r * step + jitterY - (rows * step - vh) / 2;

      // Start all from center
      el.style.left = (cx - size / 2) + 'px';
      el.style.top = (cy - size / 2) + 'px';

      explosionContainer.appendChild(el);

      const dx = targetX + size / 2 - cx;
      const dy = targetY + size / 2 - cy;
      const distFromCenter = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      const rotation = (Math.random() - 0.5) * 60;

      particles.push({ el, dx, dy, size, rotation, distFromCenter, maxDist, targetX, targetY });
    }
  }

  // Sort by distance from center — inner flowers appear first
  particles.sort((a, b) => a.distFromCenter - b.distFromCenter);

  // Phase 1: expand from center as growing cluster
  particles.forEach((p, i) => {
    const normalizedDist = p.distFromCenter / p.maxDist;
    const delay = normalizedDist * 1005 + Math.random() * 120;
    const duration = 1205 + Math.random() * 600;

    requestAnimationFrame(() => {
      setTimeout(() => {
        p.el.style.transition = `transform ${duration}ms cubic-bezier(0.16, 1, 0.3, 1), opacity ${duration * 0.4}ms cubic-bezier(0.4, 0, 0.2, 1)`;
        p.el.style.opacity = '1';
        p.el.style.transform = `translate(${p.dx}px, ${p.dy}px) rotate(${p.rotation}deg)`;
      }, delay);
    });
  });

  // Phase 2: ALL flowers fall simultaneously
  const fillTime = 2205;
  const fallDuration = 3605;
  setTimeout(() => {
    particles.forEach((p) => {
      const swayX = (Math.random() - 0.5) * 140;
      const rot = p.rotation + (Math.random() - 0.5) * 180;

      requestAnimationFrame(() => {
        p.el.style.transition = `transform ${fallDuration}ms cubic-bezier(0.55, 0.085, 0.68, 0.53), opacity ${fallDuration * 0.6}ms ease-in`;
        p.el.style.opacity = '0';
        p.el.style.transform = `translate(${p.dx + swayX}px, ${p.dy + vh + 300}px) rotate(${rot}deg) scale(0.7)`;
      });
    });

    // Show semi-transparent flower background as flowers fall
    setTimeout(() => { flowerBg.classList.add('visible'); }, 400);
    setTimeout(() => { explosionContainer.innerHTML = ''; }, 4000);
  }, fillTime);
}

// ===== SCROLL ANIMATIONS =====
function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = entry.target.dataset.delay || 0;
        setTimeout(() => entry.target.classList.add('visible'), parseInt(delay));
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('.flower-card, .greeting-card, .bloom-timer').forEach(el => {
    observer.observe(el);
  });
}

// ===== ACTIONS =====
function shareGift() {
  if (navigator.share) {
    navigator.share({ title: 'A Bouquet for You', text: 'I made a bouquet for you!', url: window.location.href });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(window.location.href);
    alert('Link copied to clipboard!');
  }
}

function startGarden() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
